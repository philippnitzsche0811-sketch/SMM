services:
  postgres:
    ports:
      - "5433:5432"
    env_file:
      - path: .env.local
        required: false

  backend:
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - path: .env.local
        required: false
    environment:
      - BACKEND_URL=http://localhost:8001
      - FRONTEND_URL=http://localhost:8080
      - UPLOAD_MOCK_MODE=true
      - AI_MOCK_MODE=true

  frontend:
    ports:
      - "8080:80"
    env_file:
      - path: .env.local
        required: false
    environment:
      - VITE_API_URL=http://localhost:8001
